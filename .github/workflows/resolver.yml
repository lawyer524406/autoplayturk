name: AutoPlay Resolver

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Cache yok say, tum ID yeniden probe edilsin'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s scripts/requirements.txt ] && grep -v '^[[:space:]]*#' scripts/requirements.txt | grep -q '[a-zA-Z]'; then
            pip install -r scripts/requirements.txt
          else
            echo "Bagimli kutuphane yok — std lib yeterli."
          fi

      - name: Run YouTube resolver
        run: python scripts/resolve_youtube.py
        env:
          PYTHONUNBUFFERED: "1"
          FORCE_FULL_RECHECK: ${{ github.event.inputs.force_full || 'false' }}

      - name: Commit & push if changed
        run: |
          git config user.name "AutoPlay Resolver Bot"
          git config user.email "bot@autoplay.local"
          git add output/
          if git diff --cached --quiet; then
            echo "Hicbir degisiklik yok — commit atlandi."
          else
            git commit -m "auto-resolve $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
